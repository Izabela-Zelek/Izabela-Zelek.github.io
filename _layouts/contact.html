---
layout: page
---

{% if site.email or site.formspree_form_id %}

<style type="text/css" media="screen">
  .container {
    margin: 0 auto;
    max-width: 600px;
  }

  [v-cloak] {
    display: none;
  }

  .has-error {
    border: 1px solid red;
  }

  span {
    color: red;
    font-size: 0.9em;
  }
</style>

<div class="container">

  <h2>{{ site.translations.contact.title | default: "Talk to me" }}</h2>

  <div id="form" class="contact-form" v-cloak>
    <form
      accept-charset="UTF-8"
      method="POST"
      action="https://formspree.io/{% if site.formspree_form_id %}f/{{ site.formspree_form_id }}{% else %}{{ site.email }}{% endif %}"
      v-on:submit.prevent="validateBeforeSubmit"
      ref="contact"
    >

      <fieldset>
        <input type="hidden" name="_subject" value="{{ site.translations.contact.subject | default: 'New contact!' }}" />
        <input type="hidden" name="_next" value="{{ site.url }}{{ site.sent_message_url }}" />
        <input type="hidden" name="_language" value="{{ site.language }}" />

        <input
          type="text"
          name="name"
          placeholder="{{ site.translations.contact.placeholders.name | default: 'Your name' }}"
          v-validate="'required'"
          :class="{ 'has-error': errors.has('name') }"
        >
        <span v-if="errors.has('name')">${ errors.first('name') }</span>

        <input
          type="text"
          name="email"
          placeholder="{{ site.translations.contact.placeholders.email | default: 'Your email' }}"
          v-validate="'required|email'"
          :class="{ 'has-error': errors.has('email') }"
        >
        <span v-if="errors.has('email')">${ errors.first('email') }</span>

        <textarea
          name="message"
          placeholder="{{ site.translations.contact.placeholders.message | default: 'Your message' }}"
          v-validate="'required'"
          :class="{ 'has-error': errors.has('message') }"
          onkeyup="adjust_textarea(this)"
        ></textarea>
        <span v-if="errors.has('message')">${ errors.first('message') }</span>

        <button type="submit">
          {{ site.translations.contact.submit_btn | default: "Send" }}
        </button>
      </fieldset>
    </form>
  </div>

</div>

<script>
function adjust_textarea(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}
</script>

<script src="https://unpkg.com/vue@2.6.14"></script>
<script src="https://unpkg.com/vee-validate@2.2.15"></script>

<script>
Vue.use(VeeValidate);

const locale = "{{ site.translations.contact.errors.locale | default: 'en' }}";

const dictionary = {
  [locale]: {
    messages: {},
    custom: {
      name: {
        required: "{{ site.translations.contact.errors.empty_name | default: 'Name is required' }}"
      },
      email: {
        required: "{{ site.translations.contact.errors.empty_email | default: 'Email is required' }}",
        email: "{{ site.translations.contact.errors.invalid_email | default: 'Email is invalid' }}"
      },
      message: {
        required: "{{ site.translations.contact.errors.empty_message | default: 'Message is required' }}"
      }
    }
  }
};

VeeValidate.Validator.localize(dictionary);
VeeValidate.Validator.localize(locale);

new Vue({
  el: "#form",
  delimiters: ["${", "}"],
  methods: {
    validateBeforeSubmit() {
      this.$validator.validateAll().then(valid => {
        if (valid) {
          this.$refs.contact.submit();
        }
      });
    }
  }
});
</script>

{% else %}

<script>
  window.location =
    "{% if site.url == '' and site.baseurl == '' %}/{% else %}{{ site.url }}{{ site.baseurl }}{% endif %}";
</script>

{% endif %}
